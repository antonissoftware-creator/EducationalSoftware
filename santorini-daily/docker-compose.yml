services:
  postgres:
    image: postgres:16
    container_name: santorini-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: santorini_daily
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d santorini_daily"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
